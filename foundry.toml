[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "src/test"
script  = "src/script"
solc    = "0.8.21"

# Optimisations pour production
optimizer        = true
optimizer_runs   = 200
via_ir           = true

# Verbose output
verbosity = 2

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
